name: Setup Node.js dependencies
description: >
  Set up Node.js 18, enable npm cache via setup-node (no packageManager in
  package.json), and run npm ci. node_modules is not cached because npm ci
  recreates it from package-lock.json.
runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "18"
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci
